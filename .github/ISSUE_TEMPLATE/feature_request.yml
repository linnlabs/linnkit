name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please note that linnkit is intentionally thin —
        it does not include built-in LLM providers, RAG, memory systems, or UI.
        Feature requests should relate to the runtime kernel, context engineering, ports, or testkit.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketch, behavior description, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
