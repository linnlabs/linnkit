name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: linnkit version
      placeholder: "e.g. 0.8.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or steps that trigger the bug.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Node version, OS, relevant contextPolicy config, error stack trace, etc.
