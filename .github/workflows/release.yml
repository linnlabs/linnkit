name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm pack --dry-run without publishing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@linnlabs'
      - run: npm install -g npm@latest
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:smoke
      - run: npm run test:smoke:dist
      - run: npm pack --dry-run
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (${VERSION}) does not match package.json (${PKG_VERSION})."
            exit 1
          fi
      - name: Publish to npmjs
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        run: npm publish --provenance --access public
