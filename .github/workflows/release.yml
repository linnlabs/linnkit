name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm pack --dry-run without publishing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@linnlabs'
          package-manager-cache: false
      - name: Verify npm trusted publishing toolchain
        run: |
          npm install -g npm@11.17.0
          node --version
          npm --version
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:smoke
      - run: npm run test:smoke:dist
      - run: npm pack --dry-run
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (${VERSION}) does not match package.json (${PKG_VERSION})."
            exit 1
          fi
      - name: Publish to npmjs
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        run: |
          set +e
          output="$(npm publish --provenance --access public 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$output" | grep -Eq 'E404|you do not have permission|could not be found'; then
            {
              echo "::error::npm publish was rejected by npmjs. Verify @linnlabs/linnkit Trusted Publisher settings: GitHub Actions; Organization/User=linnlabs; Repository=linnkit; Workflow filename=release.yml; allowed action includes npm publish."
              echo "::error::Do not fix this by adding a long-lived npm token to this workflow; OIDC publishing only works after npm package settings trust this exact workflow."
            } >&2
          fi
          if printf '%s\n' "$output" | grep -q 'previously published versions'; then
            version="$(node -p "require('./package.json').version")"
            published="$(npm view @linnlabs/linnkit version --registry=https://registry.npmjs.org/)"
            if [ "$published" = "$version" ]; then
              echo "npm package @linnlabs/linnkit@$version is already published; treating this release as complete."
              exit 0
            fi
          fi
          exit "$status"
      - name: Write GitHub release notes
        if: github.event_name == 'push'
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const heading = `## [${version}]`;
          const start = changelog.indexOf(heading);

          if (start === -1) {
            throw new Error(`CHANGELOG.md does not contain ${heading}`);
          }

          const next = changelog.indexOf('\n## [', start + heading.length);
          const section = changelog
            .slice(start, next === -1 ? undefined : next)
            .replace(/^## \[[^\]]+\][^\n]*\n?/, '')
            .trim();

          if (!section) {
            throw new Error(`CHANGELOG.md section for ${heading} is empty`);
          }

          fs.writeFileSync('github-release-notes.md', section);
          NODE
      - name: Create or update GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="@linnlabs/linnkit ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file github-release-notes.md \
              --latest
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file github-release-notes.md \
              --verify-tag \
              --latest
          fi
